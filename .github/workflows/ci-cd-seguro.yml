name: 🛡️ CI/CD Seguro - OWASP + NIST + PCI-DSS

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analisis-seguro-fullstack:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar el código
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🛡️ Linting JS
        run: npx eslint . --ignore-pattern eslint.config.mjs

      - name: 🛡️ Linting CSS
        run: npx stylelint "**/*.css" --config .stylelintrc.json

      - name: 🛡️ Escaneo HTML + W3C
        run: |
          npx htmlhint "**/*.html"
          curl -F "file=@privacidad.html" https://validator.w3.org/nu/?out=json > w3c-privacidad.json

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🛡️ Linting y seguridad Python
        run: |
          pip install pylint flake8 bandit pip-audit
          pylint **/*.py --output-format=text > pylint.txt || true
          flake8 **/*.py > flake8.txt
          bandit -r . -f json > bandit.json

      - name: "🔍 Escaneo de Secrets (NIST + PCI-DSS Req. 8.6.2)"
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified --fail

      - name: 🛡️ Semgrep - OWASP Top 10
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-ten
          generateSarif: true

      - name: 🛡️ SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=gungo-tv
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/venv/**,*.png

      - name: 🚦 SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        timeout-minutes: 5

      - name: 📦 Auditoría de Dependencias
        run: |
          npm audit --audit-level=high --json > npm-audit.json
          pip-audit --format json > pip-audit.json

      - name: 📋 Generar Reporte Final
        run: |
          cat > reporte-final.md << EOF
          # 🛡️ Reporte de Seguridad - $(date)
          Pipeline ejecutado con estándares OWASP/NIST/PCI-DSS
          Estado: Listo para producción si pasó todo.
          EOF

      - name: 📤 Subir Reporte
        uses: actions/upload-artifact@v4
        with:
          name: reporte-seguridad-gungo
          path: reporte-final.md

