name: CI/CD Pipeline Maximizado con Seguridad Enterprise

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Forzamos a GitHub a usar las herramientas actualizadas a Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 1. Setup de Entorno Node.js (Actualizado a la versión 24)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Instalar dependencias y plugins de seguridad
        run: |
          npm install
          npm install --save-dev eslint-plugin-security eslint-plugin-no-unsanitized npm-audit-ci

      # 2. Análisis Estático de Seguridad (SAST Avanzado para JS)
      - name: Linting de Seguridad JS/Node
        run: |
          npx eslint . --ext .js,.jsx --plugin security --plugin no-unsanitized --rule 'no-unsanitized/method: error, no-unsanitized/property: error' || true 

      # 3. Escaneo de Secrets (Corregido para evitar el error BASE/HEAD)
      - name: Escaneo de Secrets con TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      # 4. Semgrep Configurado para OWASP en Node/Express
      - name: Semgrep Security Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/owasp-top-ten, p/javascript, p/expressjs, p/nodejs"
          generateSarif: true

      # 5. Auditoría de Dependencias NPM
      - name: Auditoría de Dependencias NPM
        run: npx npm-audit-ci --moderate

      # 6. Verificación de Integridad de Código (SonarQube)
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ./
        continue-on-error: true

      # 7. Análisis Dinámico (DAST) - Verificación de Cabeceras HTTP
      - name: Levantar servidor local para test DAST
        run: |
          npm start & 
          sleep 10
        env:
          NODE_ENV: test

      - name: OWASP ZAP Baseline Scan (Verifica Headers, CSP)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
          rules_file_name: '.zap/rules.tsv'

      # 8. Reportes y Bloqueos
      - name: Generar Reporte Unificado de Seguridad
        if: always()
        run: |
          echo "# Reporte de Seguridad Ciberseguridad - $(date)" > reporte.md
          echo "## SAST y Sanitización (Node.js)" >> reporte.md
          echo "Revisión completada. Revisa los logs de ESLint y Semgrep para detalles." >> reporte.md

      - name: Subir Reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-seguridad
          path: reporte.md
