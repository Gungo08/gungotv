name: CI/CD Pipeline Maximizado con Seguridad Enterprise

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 1. Setup de Entorno Node.js (Exclusivo para tu arquitectura)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar dependencias y plugins de seguridad
        run: |
          npm install
          npm install --save-dev eslint-plugin-security eslint-plugin-no-unsanitized npm-audit-ci

      # 2. Análisis Estático de Seguridad (SAST Avanzado para JS)
      - name: Linting de Seguridad JS/Node (Detecta XSS y Sanitización)
        run: |
          npx eslint . --ext .js,.jsx --plugin security --plugin no-unsanitized --rule 'no-unsanitized/method: error, no-unsanitized/property: error' || true 
          # Nota: Agregamos '|| true' temporalmente para que no rompa si no tienes reglas de ESLint configuradas aún.

      # 3. Escaneo de Secretos (Evita fuga de credenciales)
      - name: Escaneo de Secrets con TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # 4. Semgrep Configurado para OWASP en Node/Express
      - name: Semgrep Security Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/owasp-top-ten, p/javascript, p/expressjs, p/nodejs"
          generateSarif: true

      # 5. Auditoría de Dependencias Estricta (Supply Chain Attacks)
      - name: Auditoría de Dependencias NPM
        run: npx npm-audit-ci --moderate

      # 6. Verificación de Integridad de Código (SonarQube)
      # Nota: Requiere configurar SONAR_TOKEN en los Secrets de GitHub
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ./
        continue-on-error: true # Permite continuar si aún no configuras SonarQube

      # 7. Análisis Dinámico (DAST) - Verificación de Cabeceras HTTP
      - name: Levantar servidor local para test DAST
        run: |
          npm start & 
          sleep 10
        env:
          NODE_ENV: test

      - name: OWASP ZAP Baseline Scan (Verifica Headers, CSP)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000' # Asegúrate de que este sea el puerto de tu app
          fail_action: false # Cambiar a true cuando las cabeceras estén perfectas
          rules_file_name: '.zap/rules.tsv'

      # 8. Reportes y Bloqueos
      - name: Generar Reporte Unificado de Seguridad
        if: always()
        run: |
          echo "# Reporte de Seguridad Ciberseguridad - $(date)" > reporte.md
          echo "## SAST y Sanitización (Node.js)" >> reporte.md
          echo "Revisión completada. Revisa los logs de ESLint y Semgrep para detalles." >> reporte.md

      - name: Subir Reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-seguridad
          path: reporte.md

      # 9. Notificación de Brechas (Comentado temporalmente)
      # Para activarlo, ve a Settings > Secrets and variables > Actions
      # y crea un "New repository secret" llamado SLACK_WEBHOOK
