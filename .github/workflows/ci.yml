name: CI - Validate Web Assets

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint
        run: npx eslint "src/**/*.js" || true

      - name: Stylelint
        run: npx stylelint "**/*.css" || true

      - name: HTMLHint
        run: npx htmlhint "**/*.html" || true

      - name: Run unit tests
        run: npm test --silent || true

      - name: Build site
        run: npm run build || true

      - name: W3C HTML validation
        run: |
          if [ -f dist/index.html ]; then
            npx html-validator --file=dist/index.html --verbose
          else
            echo "dist/index.html not found, skipping html-validator"
          fi

      - name: Start CSP report-only staging and collect reports
        run: node scripts/csp-report-only.js
        env:
          CI: true

      - name: Accessibility scan (Pa11y)
        run: npx pa11y http://localhost:8080 || true

      - name: Run Playwright tests
        uses: microsoft/playwright-github-action@v1
        with:
          run: npx playwright test || true

      - name: Deploy preview to Netlify (optional)
        if: github.event_name == 'pull_request' && secrets.NETLIFY_AUTH_TOKEN
        uses: nwtgck/actions-netlify@v1
        with:
          publish-dir: ./dist
          production-deploy: false
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Post summary comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            CI checks completed. Revisa los logs para detalles. Si hay violaciones CSP o accesibilidad, corrígelas en staging.
